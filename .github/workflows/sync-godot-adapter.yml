name: sync-godot-adapter

on:
  push:
    branches: [main]
    paths:
      - "src/Unidote.Godot/addons/Unidote/**"
      - "!src/Unidote.Godot/addons/Unidote/Core/**"
      - "scripts/sync-godot-adapter.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unidote-sync-godot-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Sync and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            bash ./scripts/sync-godot-adapter.sh

            git add -f samples/UnidoteGodotDemo/addons/Unidote

            if git diff --cached --quiet; then
              echo "Godot sample already up to date — nothing to commit."
              exit 0
            fi

            git commit -m "chore: sync Godot adapter to sample project"
            if git push origin HEAD:main; then
              exit 0
            fi
          done

          echo "::error::Failed to push synced Godot adapter changes after 3 attempts." >&2
          exit 1
