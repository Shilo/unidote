name: release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unidote-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Refresh release base
        run: |
          git fetch origin main
          git pull --ff-only origin main
          echo "RELEASE_BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@main
        with:
          version: 4.6.0-stable
          use-dotnet: true
          include-templates: true

      - name: Sync Core to engine adapters
        run: bash ./scripts/sync-core.sh

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' src/Unidote.Unity/package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -gt 9 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          if [ "$MINOR" -gt 9 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$NEW" >> "$GITHUB_OUTPUT"
          echo "TAG=v$NEW" >> "$GITHUB_OUTPUT"

          jq --arg v "$NEW" '.version = $v' src/Unidote.Unity/package.json > tmp.json
          mv tmp.json src/Unidote.Unity/package.json

          sed -i "s/^version=\".*\"/version=\"$NEW\"/" src/Unidote.Godot/addons/Unidote/plugin.cfg

      - name: Sync sample projects from release-ready engine sources
        run: |
          bash ./scripts/sync-godot-adapter.sh
          bash ./scripts/sync-unity-adapter.sh

      - name: Verify release-ready state
        run: bash ./scripts/verify.sh

      - name: Export Godot demo for Windows
        run: |
          mkdir -p samples/UnidoteGodotDemo/build
          godot --headless --path samples/UnidoteGodotDemo --export-release "Windows Desktop"

      - name: Zip Godot addon
        run: |
          cd src/Unidote.Godot
          mkdir -p ../../dist/addons
          cp -r addons/Unidote ../../dist/addons/Unidote
          cd ../../dist
          zip -r ../Unidote-Godot-${{ steps.version.outputs.VERSION }}.zip addons/
          cd ..
          rm -rf dist

      - name: Zip Unity package
        run: |
          cd src/Unidote.Unity
          zip -r ../../Unidote-Unity-${{ steps.version.outputs.VERSION }}.zip .

      - name: Zip Godot demo build
        run: |
          cd samples/UnidoteGodotDemo/build
          zip -r ../../../UnidoteDemo-Windows-${{ steps.version.outputs.VERSION }}.zip .

      - name: Commit fully synced release state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f \
            src/Unidote.Unity/Runtime/Core \
            src/Unidote.Godot/addons/Unidote/Core
          git add \
            src/Unidote.Unity/package.json \
            src/Unidote.Godot/addons/Unidote/plugin.cfg
          git add -f \
            samples/UnidoteGodotDemo/addons/Unidote \
            samples/UnidoteUnityDemo/Packages/com.shilo.unidote
          git commit -m "chore(release): prepare ${{ steps.version.outputs.VERSION }}"

      - name: Push release commit to main
        run: |
          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$RELEASE_BASE_SHA" ]; then
            echo "::error::origin/main advanced during release preparation; rerun release."
            exit 1
          fi
          git push origin HEAD:main

      - name: Tag the pushed release commit
        run: |
          RELEASE_SHA="$(git rev-parse HEAD)"
          git tag "${{ steps.version.outputs.TAG }}" "$RELEASE_SHA"
          git push origin "${{ steps.version.outputs.TAG }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.TAG }} \
            --title "Unidote ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            Unidote-Godot-${{ steps.version.outputs.VERSION }}.zip \
            Unidote-Unity-${{ steps.version.outputs.VERSION }}.zip \
            UnidoteDemo-Windows-${{ steps.version.outputs.VERSION }}.zip
