name: build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  godot-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@main
        with:
          version: 4.6.0-stable
          use-dotnet: true
          include-templates: true

      - name: Restore .NET dependencies
        run: dotnet restore samples/UnidoteGodotDemo/UnidoteGodotDemo.csproj

      - name: Build .NET project
        run: dotnet build samples/UnidoteGodotDemo/UnidoteGodotDemo.csproj --configuration Release --no-restore

      - name: Export Godot project for Windows
        run: |
          mkdir -p samples/UnidoteGodotDemo/build
          godot --headless --path samples/UnidoteGodotDemo --export-release "Windows Desktop"

      - name: Zip build output
        run: |
          cd samples/UnidoteGodotDemo/build
          zip -r ../../../UnidoteDemo-Windows-${{ inputs.version }}.zip .

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ inputs.tag }} \
            UnidoteDemo-Windows-${{ inputs.version }}.zip
